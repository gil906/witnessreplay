<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">WitnessReplay Devpost Architecture Diagram</title>
  <desc id="desc">High-level architecture showing the witness client, FastAPI backend with Detective Ray, Google Gemini services, Google Cloud services, and export outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#60a5fa"/>
    </marker>
    <style>
      .panel { fill: rgba(15, 23, 42, 0.86); stroke: rgba(148, 163, 184, 0.35); stroke-width: 2; rx: 28; filter: url(#shadow); }
      .subpanel { fill: rgba(15, 23, 42, 0.72); stroke: rgba(148, 163, 184, 0.2); stroke-width: 1.5; rx: 18; }
      .title { font: 700 38px Inter, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .panel-title { font: 700 28px Inter, Arial, sans-serif; fill: #f8fafc; }
      .panel-copy { font: 500 17px Inter, Arial, sans-serif; fill: #dbeafe; }
      .bullet { font: 500 16px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #94a3b8; }
      .chip { fill: rgba(56, 189, 248, 0.12); stroke: rgba(56, 189, 248, 0.45); stroke-width: 1.25; rx: 14; }
      .chip-text { font: 600 14px Inter, Arial, sans-serif; fill: #bae6fd; }
      .line { stroke: #60a5fa; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: rgba(148, 163, 184, 0.5); stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .accent { fill: url(#accent); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect x="64" y="44" width="1472" height="6" class="accent" rx="3"/>
  <text x="80" y="104" class="title">WitnessReplay - Devpost Submission Architecture</text>
  <text x="80" y="138" class="subtitle">Live multimodal witness interview agent using Gemini, FastAPI, Google Cloud integrations, and exportable investigative outputs.</text>

  <rect x="80" y="190" width="410" height="510" class="panel"/>
  <text x="112" y="244" class="panel-title">1. Witness Client</text>
  <text x="112" y="278" class="panel-copy">Mobile-first web experience for the witness and interviewer.</text>

  <rect x="112" y="312" width="346" height="82" class="subpanel"/>
  <text x="136" y="346" class="bullet">- Voice-first conversation with Detective Ray</text>
  <text x="136" y="373" class="bullet">- Auto-listen, interruption, and live transcript</text>

  <rect x="112" y="414" width="346" height="82" class="subpanel"/>
  <text x="136" y="448" class="bullet">- Multimodal inputs: voice, text, photos, sketches</text>
  <text x="136" y="475" class="bullet">- Mobile chat pinned to the latest message</text>

  <rect x="112" y="516" width="346" height="82" class="subpanel"/>
  <text x="136" y="550" class="bullet">- Spoken replies plus on-screen transcript</text>
  <text x="136" y="577" class="bullet">- Scene preview and export controls</text>

  <rect x="112" y="620" width="150" height="36" class="chip"/>
  <text x="132" y="643" class="chip-text">WebSocket live audio</text>
  <rect x="272" y="620" width="120" height="36" class="chip"/>
  <text x="308" y="643" class="chip-text">REST APIs</text>

  <rect x="595" y="190" width="410" height="510" class="panel"/>
  <text x="627" y="244" class="panel-title">2. FastAPI + Detective Ray Backend</text>
  <text x="627" y="278" class="panel-copy">The orchestration layer that keeps the interview coherent and actionable.</text>

  <rect x="627" y="312" width="346" height="92" class="subpanel"/>
  <text x="651" y="345" class="bullet">- REST routes and WebSocket session channel</text>
  <text x="651" y="372" class="bullet">- Session persistence, case grouping, exports</text>
  <text x="651" y="399" class="bullet">- Admin review workflows</text>

  <rect x="627" y="424" width="346" height="116" class="subpanel"/>
  <text x="651" y="458" class="bullet">- Detective Ray agent + conversation state</text>
  <text x="651" y="485" class="bullet">- Required-detail follow-ups and safer completion</text>
  <text x="651" y="512" class="bullet">- Contradictions, summaries, evidence extraction</text>

  <rect x="627" y="560" width="346" height="96" class="subpanel"/>
  <text x="651" y="594" class="bullet">- PDF / JSON / evidence export endpoints</text>
  <text x="651" y="621" class="bullet">- Timeline, report, and case artifacts</text>

  <rect x="1110" y="190" width="410" height="510" class="panel"/>
  <text x="1142" y="244" class="panel-title">3. Gemini + Google Cloud Services</text>
  <text x="1142" y="278" class="panel-copy">Model layer, storage, and challenge-aligned cloud deployment assets.</text>

  <rect x="1142" y="312" width="346" height="92" class="subpanel"/>
  <text x="1166" y="345" class="bullet">- Gemini Live / native audio conversation path</text>
  <text x="1166" y="372" class="bullet">- Gemini TTS and image-generation flows</text>
  <text x="1166" y="399" class="bullet">- Google GenAI SDK integration</text>

  <rect x="1142" y="424" width="346" height="116" class="subpanel"/>
  <text x="1166" y="458" class="bullet">- Firestore for cloud-backed session storage</text>
  <text x="1166" y="485" class="bullet">- Cloud Storage for media and generated assets</text>
  <text x="1166" y="512" class="bullet">- Secret Manager / IAM in Terraform path</text>

  <rect x="1142" y="560" width="346" height="96" class="subpanel"/>
  <text x="1166" y="594" class="bullet">- Cloud Build -> Cloud Run deployment path</text>
  <text x="1166" y="621" class="bullet">- Terraform assets for reproducible setup</text>

  <path d="M490 445 C540 445, 545 445, 595 445" class="line"/>
  <path d="M1005 445 C1055 445, 1060 445, 1110 445" class="line"/>

  <rect x="220" y="736" width="1160" height="170" class="panel"/>
  <text x="252" y="786" class="panel-title">4. Outputs for investigators and judges</text>
  <text x="252" y="820" class="panel-copy">WitnessReplay turns the live interview into durable artifacts that can be reviewed, exported, and submitted.</text>

  <rect x="252" y="842" width="250" height="40" class="chip"/>
  <text x="284" y="867" class="chip-text">Live transcript + audio turns</text>
  <rect x="522" y="842" width="250" height="40" class="chip"/>
  <text x="565" y="867" class="chip-text">Scene reconstruction previews</text>
  <rect x="792" y="842" width="250" height="40" class="chip"/>
  <text x="851" y="867" class="chip-text">Case/report exports</text>
  <rect x="1062" y="842" width="286" height="40" class="chip"/>
  <text x="1110" y="867" class="chip-text">Devpost bundle + architecture file</text>

  <path d="M800 700 L800 736" class="line-soft"/>
  <text x="80" y="948" class="small">Repository: github.com/gil906/witnessreplay  |  Submission assets: docs/devpost/*  |  Bundle generator: tools/export_devpost_bundle.py</text>
</svg>
